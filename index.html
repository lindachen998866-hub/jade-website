<!-- Sanity 集成 + 图片加载备份 -->
<script type="module">
  import { createClient } from "https://esm.sh/@sanity/client";

  const client = createClient({
    projectId: "e5fhh31p",
    dataset: "production",
    apiVersion: "2026-01-01",
    useCdn: true,
  });

  const query = `*[
    _type in ["product", "post"] &&
    (!defined(isVisible) || isVisible == true)
  ] | order(coalesce(order, 9999) asc, _createdAt desc){
    _id,
    title,
    price,
    description,
    "imageUrl": image.asset->url
  }`;

  const jadeContainer = document.getElementById("jade-list");

  async function loadSanityPosts() {
    try {
      const items = await client.fetch(query);

      if (!items || items.length === 0) {
        jadeContainer.innerHTML = `
          <div style="grid-column:1/-1; text-align:center; padding:40px;">
            ✨ 即將上線更多翡翠臻品，敬請期待 ✨
          </div>
        `;
        return;
      }

      const cardsHtml = items.map(item => {
        let imgHtml = '';

        if (item.imageUrl) {
          imgHtml = `
            <img 
              class="card-img" 
              src="${item.imageUrl}" 
              alt="${escapeHtml(item.title) || '翡翠作品'}" 
              loading="lazy" 
              onerror="this.src='https://cdn.pixabay.com/photo/2018/12/13/18/44/jade-3873213_1280.jpg'"
            >
          `;
        } else {
          imgHtml = `
            <img 
              class="card-img" 
              src="https://cdn.pixabay.com/photo/2018/12/13/18/44/jade-3873213_1280.jpg" 
              alt="翡翠意境圖"
            >
          `;
        }

        const priceHtml = item.price
          ? `<p style="color:#c8a96a; font-weight:600; margin-bottom:10px;">收藏價：${formatPrice(item.price)}</p>`
          : '';

        return `
          <div class="card">
            ${imgHtml}
            <div class="card-content">
              <h3>${escapeHtml(item.title) || '無題 · 靈韻'}</h3>
              ${priceHtml}
              <p>${escapeHtml(item.description) || '天然翡翠，質地細膩，收藏級美學。'}</p>
            </div>
          </div>
        `;
      }).join('');

      jadeContainer.innerHTML = cardsHtml;

    } catch (error) {
      console.error("Sanity 加載錯誤:", error);
      jadeContainer.innerHTML = `
        <div style="grid-column:1/-1; text-align:center; padding:40px; color:#c8a96a;">
          <i class="fas fa-exclamation-triangle"></i> 
          暫時無法連接作品庫，請稍後再試。<br>
          Line 聯繫我們獲取珍藏清單。
        </div>
      `;
    }
  }

  function formatPrice(price) {
    const numberPrice = Number(price);

    if (Number.isFinite(numberPrice)) {
      return `NT$ ${numberPrice.toLocaleString("zh-TW")}`;
    }

    return escapeHtml(String(price));
  }

  function escapeHtml(str) {
    if (!str) return '';

    return String(str).replace(/[&<>"]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      if (m === '"') return '&quot;';
      return m;
    });
  }

  loadSanityPosts();

  const galleryImages = document.querySelectorAll('.gallery-item img');
  galleryImages.forEach(img => {
    img.addEventListener('click', () => {
      window.open(img.src, '_blank');
    });
  });
</script>
