<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>翡翠雅藏 Jade Collection</title>

<style>
  body {
    margin: 0;
    font-family: "Playfair Display", "Noto Serif TC", serif;
    background: #0c1513;
    color: #f5f5f5;
  }

  header {
    height: 100vh;
    background: url('https://old-coffee-b7k4dbij.edgeone.app/image_%E7%BF%A1%E7%BF%A0%E6%89%93%E5%B7%A5%E4%BA%BA_%E4%BD%B3%E5%A3%AB%E5%BE%97%E6%8B%8D%E5%8D%96%E6%AC%BE%E9%9B%AA%E8%8A%B1%E6%88%92%E6%8C%87..._0.png') center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
  }

  header::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.55);
  }

  header h1, header p {
    position: relative;
    z-index: 1;
  }

  header h1 {
    font-size: 64px;
    letter-spacing: 10px;
  }

  header p {
    font-size: 20px;
    opacity: 0.85;
  }

  section {
    padding: 100px 15%;
    border-bottom: 1px solid rgba(200,169,106,0.25);
  }

  .title {
    font-size: 34px;
    margin-bottom: 40px;
    border-left: 5px solid #c8a96a;
    padding-left: 15px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 40px;
  }

  .card {
    background: #14221e;
    padding: 22px;
    border-radius: 16px;
    transition: 0.4s;
  }

  .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 0 25px rgba(200,169,106,0.35);
  }

  .card img {
    width: 100%;
    border-radius: 14px;
    margin-bottom: 18px;
  }

  footer {
    text-align: center;
    padding: 50px;
    background: #08100e;
    font-size: 13px;
    opacity: 0.6;
  }
</style>
</head>

<body>

<header>
  <h1>翡翠雅藏</h1>
  <p>天然翡翠藝術收藏 · 東方美學的靜謐呈現</p>
</header>

<section>
  <div class="title">品牌理念</div>
  <p>
    我們專注於天然翡翠的甄選與藝術呈現，  
    每一件作品皆以收藏級標準精選，  
    融合東方玉文化與現代極簡美學。
  </p>
</section>

<section>
  <div class="title">翡翠作品</div>

  <div class="grid" id="jade-list">
    <!-- Sanity 自動載入 -->
  </div>
</section>

<section>
  <div class="title">收藏理念</div>
  <p>
    翡翠是自然與時間的結晶，每件作品都有獨特文化與價值。
  </p>
</section>

<footer>
  © 2026 翡翠雅藏 Jade Collection · Exhibition Only
</footer>

<!-- 🚀 Sanity 載入（關鍵） -->
<script type="module">
import { createClient } from "https://esm.sh/@sanity/client";

const client = createClient({
  projectId: "nuyprr23",
  dataset: "production",
  apiVersion: "2026-01-01",
  useCdn: true,
});

const query = `*[_type == "post"]{
  _id,
  title,
  description,
  "imageUrl": image.asset->url
}`;

client.fetch(query).then((items) => {
  const box = document.getElementById("jade-list");

  box.innerHTML = items.map(item => `
    <div class="card">
      <img src="${item.imageUrl || ''}" />
      <h3>${item.title || ''}</h3>
      <p>${item.description || ''}</p>
    </div>
  `).join("");
});
</script>

</body>
</html>
