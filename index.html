<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>翡翠雅藏 Jade Collection</title>
<style>
  body {
    margin: 0;
    font-family: "Playfair Display", "Noto Serif TC", serif;
    background: #0f1a17;
    color: #f5f5f5;
  }

  header {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1600180758890-6b94519a8ba6') center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  header h1 {
    font-size: 60px;
    letter-spacing: 10px;
    color: #f5f5f5;
  }

  header p {
    font-size: 22px;
    opacity: 0.8;
  }

  section {
    padding: 100px 15%;
    border-bottom: 1px solid rgba(200,169,106,0.3);
  }

  .title {
    font-size: 36px;
    margin-bottom: 40px;
    border-left: 5px solid #c8a96a;
    padding-left: 15px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 40px;
  }

  .card {
    background: #16231f;
    padding: 25px;
    border-radius: 16px;
    transition: 0.4s;
  }

  .card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 25px rgba(200,169,106,0.6);
  }

  .card img {
    width: 100%;
    border-radius: 14px;
    margin-bottom: 20px;
  }

  .price {
    color: #c8a96a;
    font-weight: bold;
    font-size: 20px;
  }

  .line-btn {
    display: inline-block;
    background: linear-gradient(90deg, #00c300, #009900);
    color: #fff;
    padding: 14px 32px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    font-size: 20px;
    margin-top: 30px;
    transition: 0.3s;
  }

  .line-btn:hover {
    background: linear-gradient(90deg, #00a000, #007700);
    box-shadow: 0 0 20px rgba(0,255,0,0.5);
  }

  footer {
    text-align: center;
    padding: 50px;
    background: #0b120f;
    font-size: 14px;
    opacity: 0.7;
  }

</style>
</head>
<body>

<header>
  <h1>翡翠雅藏</h1>
  <p>天然翡翠 · 東方美學 · 傳世之選</p>
  <a class="line-btn" href="https://line.me/R/ti/p/@你的ID" target="_blank">聯絡我們 LINE</https://line.me/ti/p/YgY2ALxyDF>
</header>

<section>
  <div class="title">精品系列</div>
  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1611599539390-0b7d1d2d1c3a">
      <h3>冰種蘭花飄</h3>
      <p class="price">NT$3,280</p>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1603398938378-e54eab446dde">
      <h3>糯種蘭花飄</h3>
      <p class="price">NT$1,880</p>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
      <h3>冰種細緻雲霧</h3>
      <p class="price">NT$3,980</p>
    </div>
  </div>
</section>

<section>
  <div class="title">收藏價值</div>
  <p>
    翡翠不只是飾品，而是文化、藝術與時間的凝結。
    每件作品都是自然與工藝共同完成的藝術結晶，呈現尊貴與奢華質感。
  </p>
</section>

<footer>
  © 2026 翡翠雅藏 Jade Collection. All Rights Reserved.
</footer>

</body>
</html>
