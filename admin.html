<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>翡翠雅藏管理後台</title>

<style>
body{
background:#0c1513;
color:white;
font-family:Arial;
padding:30px;
}

.box{
max-width:700px;
margin:auto;
background:#14221e;
padding:30px;
border-radius:20px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
}

button{
background:#c8a96a;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<div class="box">
<h1>翡翠雅藏商品管理</h1>

<input placeholder="商品名稱">

<input placeholder="商品價格">

<textarea placeholder="商品介紹"></textarea>

<input type="file">

<button>新增商品</button>

</div>

</body>
</html>
